<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S2 France Championship</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-noise"></div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>S2 CHAMP</h2>

    <a onclick="show('home')">Dashboard</a>
    <a onclick="show('teams')">Équipes</a>
    <a onclick="show('matches')">Matchs</a>
    <a onclick="show('ranking')">Classement</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h1>Standoff 2 - France Championship</h1>
    </div>

    <!-- HOME -->
    <section id="home" class="page active">
      <div class="grid">

        <div class="card neon">
          🏆 Teams
          <h2 id="teamCount">0</h2>
        </div>

        <div class="card neon">
          ⚔️ Matches
          <h2 id="matchCount">0</h2>
        </div>

        <div class="card neon">
          🔥 Season
          <h2>S1</h2>
        </div>

        <div class="card neon">
          📊 Status
          <h2>LIVE</h2>
        </div>

      </div>
    </section>

    <!-- TEAMS -->
    <section id="teams" class="page">
      <h2>Équipes</h2>
      <div id="teamList"></div>
    </section>

    <!-- MATCHS -->
    <section id="matches" class="page">
      <h2>Matchs</h2>
      <div id="matchList"></div>
    </section>

    <!-- RANKING -->
    <section id="ranking" class="page">
      <h2>Classement</h2>
      <div id="rankingList"></div>
    </section>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
