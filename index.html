<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S2 Championship Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🏆 S2 CHAMP</h2>

  <a onclick="show('home')">Dashboard</a>
  <a onclick="show('teams')">Teams</a>
  <a onclick="show('matches')">Matches</a>
  <a onclick="show('ranking')">Ranking</a>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <h1>Standoff 2 France Championship</h1>
  </div>

  <!-- HOME -->
  <section id="home" class="page active">

    <div class="grid">

      <div class="card neon">
        🏆 Teams
        <h2 id="teamCount">0</h2>
      </div>

      <div class="card neon">
        ⚔️ Matches
        <h2 id="matchCount">0</h2>
      </div>

      <div class="card neon">
        📊 Live Status
        <h2>Online</h2>
      </div>

      <div class="card neon">
        🔥 Season
        <h2>S1</h2>
      </div>

    </div>

  </section>

  <!-- TEAMS -->
  <section id="teams" class="page">
    <h2>Teams</h2>

    <input id="teamInput" placeholder="Nom team">
    <button onclick="addTeam()">Ajouter</button>

    <div id="teamList"></div>
  </section>

  <!-- MATCHES -->
  <section id="matches" class="page">
    <h2>Matches</h2>

    <input id="t1" placeholder="Team 1">
    <input id="t2" placeholder="Team 2">
    <input id="s1" placeholder="Score 1">
    <input id="s2" placeholder="Score 2">

    <button onclick="addMatch()">Ajouter match</button>

    <div id="matchList"></div>
  </section>

  <!-- RANKING -->
  <section id="ranking" class="page">
    <h2>Ranking</h2>

    <div class="table" id="rankingList"></div>
  </section>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
