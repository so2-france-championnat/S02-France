<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SO2 FR CHAMPIONNAT</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>
<div class="noise"></div>

<header class="header">
  <div class="brand">
    <img src="logo.png" class="mainLogo">
    <div class="logoText">SO2 FR CHAMPIONNAT</div>
  </div>

  <div class="live">● LIVE SAISON 1</div>
</header>

<nav class="nav">
  <button onclick="show('home')">Accueil</button>
  <button onclick="show('teams')">Équipes</button>
  <button onclick="show('players')">Joueurs</button>
  <button onclick="show('matches')">Matchs</button>
  <button onclick="show('ranking')">Classement</button>
  <button onclick="show('teamDetail')">Équipe</button>
</nav>

<!-- HOME -->
<section id="home" class="page active">
  <div class="grid">

    <div class="card glow">👥 Équipes <h2 id="teamCount"></h2></div>
    <div class="card glow">👤 Joueurs <h2 id="playerCount"></h2></div>

    <div class="card season">
      ⚜️ SAISON 1 CHAMPIONNAT SO2 FRANCE ⚜️
      <p>Compétition officielle</p>
    </div>

  </div>
</section>

<!-- TEAMS -->
<section id="teams" class="page">
  <h2 class="title">Équipes</h2>
  <div id="teamList"></div>
</section>

<!-- PLAYERS -->
<section id="players" class="page">
  <h2 class="title">Joueurs</h2>
  <div id="playerList"></div>
</section>

<!-- MATCHS -->
<section id="matches" class="page">
  <h2 class="title">Matchs</h2>
  <div id="matchList"></div>
</section>

<!-- RANKING -->
<section id="ranking" class="page">
  <h2 class="title">Classement</h2>
  <div id="rankingList"></div>
</section>

<!-- TEAM DETAIL -->
<section id="teamDetail" class="page">

  <h2 class="title">Équipe</h2>

  <div id="teamInfo" class="card"></div>

  <button class="toggleBtn" onclick="toggleHistory()">
    Afficher / Masquer historique
  </button>

  <div id="teamMatches" style="display:none;"></div>

</section>

<script src="script.js"></script>
</body>
</html>
