<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SO2 FR CHAMPIONSHIP</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<header class="header">
  <div class="brand">
    <img src="logo.jpg" class="logo">
    <div class="title">SO2 FR CHAMPIONSHIP</div>
  </div>

  <div class="live">● SEASON 1</div>
</header>

<!-- SOCIAL -->
<div class="social">
  <button class="discord" onclick="window.open('https://discord.gg/WzN424KX6')">Discord</button>
  <button class="twitch" onclick="window.open('https://m.twitch.tv/so2francechampionnat/home')">Twitch</button>
  <button class="youtube" onclick="window.open('https://m.youtube.com/channel/UCypbT6QGPC0oARGa3n1XbRQ?ra=m')">YouTube</button>
</div>

<nav class="nav">
  <button onclick="show('home')">Home</button>
  <button onclick="show('teams')">Teams</button>
  <button onclick="show('players')">Players</button>
  <button onclick="show('matches')">Matches</button>
  <button onclick="show('ranking')">Rankings</button>
</nav>

<!-- HOME -->
<section id="home" class="page active">

  <div class="grid">

    <div class="card clickable" onclick="show('teams')">
      👥 Teams
      <h2>18</h2>
    </div>

    <div class="card clickable" onclick="show('players')">
      👤 Players
      <h2>90</h2>
    </div>

    <div class="card clickable" onclick="show('matches')">
      ⚔️ Matches
    </div>

    <div class="card clickable" onclick="show('ranking')">
      🏆 Rankings
    </div>

  </div>

  <!-- IMAGE INTERNATIONALE -->
  <div class="home-banner">
    <img src="international.jpg" alt="SO2 International Tournament">
  </div>

</section>

<!-- TEAMS -->
<section id="teams" class="page">
  <h2>Teams</h2>
  <div id="teamList"></div>
</section>

<!-- PLAYERS -->
<section id="players" class="page">
  <h2>Leaderboard</h2>
  <div id="playerList"></div>
</section>

<!-- MATCHES -->
<section id="matches" class="page">
  <h2>Matches</h2>
  <div id="matchList"></div>
</section>

<!-- RANKING -->
<section id="ranking" class="page">
  <h2>Team Rankings</h2>
  <div id="rankingList"></div>
</section>

<script src="script.js"></script>
</body>
</html>
