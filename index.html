<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S2 France Championship</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>
<div class="noise"></div>

<header class="header">
  <div class="logo">🎮 S2 FRANCE CHAMPIONSHIP</div>
  <div class="live">● LIVE SEASON 1</div>
</header>

<nav class="nav">
  <button onclick="show('home')">Dashboard</button>
  <button onclick="show('teams')">Équipes</button>
  <button onclick="show('players')">Joueurs</button>
  <button onclick="show('matches')">Matchs</button>
  <button onclick="show('ranking')">Classement</button>
</nav>

<!-- DASHBOARD -->
<section id="home" class="page active">
  <div class="grid">

    <div class="card glow">
      👥 Équipes
      <h2 id="teamCount"></h2>
    </div>

    <div class="card glow">
      👤 Joueurs
      <h2 id="playerCount"></h2>
    </div>

    <div class="card glow">
      ⚔️ Matchs
      <h2 id="matchCount"></h2>
    </div>

    <div class="card glow">
      🏆 Saison
      <h2>S1</h2>
    </div>

  </div>

  <div class="card highlight">
    🔥 MATCH DU MOMENT : Alpha 13 - 10 Omega (BO3)
  </div>
</section>

<!-- TEAMS -->
<section id="teams" class="page">
  <h2 class="title">Équipes</h2>
  <div id="teamList"></div>
</section>

<!-- PLAYERS -->
<section id="players" class="page">
  <h2 class="title">Joueurs</h2>
  <div id="playerList"></div>
</section>

<!-- MATCHES -->
<section id="matches" class="page">
  <h2 class="title">Matchs</h2>
  <div id="matchList"></div>
</section>

<!-- RANKING -->
<section id="ranking" class="page">
  <h2 class="title">Classement</h2>
  <div id="rankingList"></div>
</section>

<script src="script.js"></script>
</body>
</html>
